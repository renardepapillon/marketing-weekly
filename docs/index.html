<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>互联网平台营销周报</title>
<style>

  h1 { color: #1a1a2e; border-bottom: 3px solid #e63946; padding-bottom: 10px; }
  .desc { color: #666; margin-bottom: 32px; }
  .tag { display: inline-block; background: #e8f4fd; color: #1565c0;
         padding: 2px 8px; border-radius: 10px; font-size: 12px; margin: 2px; }
  ul { list-style: none; padding: 0; }
  li { background: #fff; margin: 10px 0; padding: 16px 20px; border-radius: 8px;
       box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  a { color: #2563eb; text-decoration: none; font-size: 16px; font-weight: 500; }
  a:hover { text-decoration: underline; }
  .empty { color: #999; text-align: center; padding: 40px; }
</style>
</head>
<body>
<h1>📊 互联网平台营销周报</h1>
<p class="desc">

  <span class="tag">巨量引擎营销观察</span>

  <span class="tag">阿里妈妈数字营销</span>

</html>
